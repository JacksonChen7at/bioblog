<!DOCTYPE html>
<html>
<head>
    <title>Plant Quiz</title>
    <style>
        body {
            font-family: Arial;
            background: #e8f5e9;
            margin: 0;
        }
        nav {
            background: #2e7d32;
            padding: 15px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            text-decoration: underline;
        }
        section {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 12px;
        }
        button {
            display: block;
            margin: 10px 0;
            padding: 10px;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: #81c784;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #66bb6a;
        }
        #score {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="learn.html">Learn More</a>
    <a href="quiz.html">Quiz</a>
</nav>

<p id="score">Score: 0</p>

<section class="question" data-correct="0">
    <p>1. What process do plants use to make oxygen?</p>
    <button onclick="answerQuestion(this, 0)">Photosynthesis</button>
    <button onclick="answerQuestion(this, 1)">Respiration</button>
    <button onclick="answerQuestion(this, 1)">Digestion</button>
    <button onclick="answerQuestion(this, 1)">Evaporation</button>
</section>

<section class="question" data-correct="0">
    <p>2. What type of plant is moss?</p>
    <button onclick="answerQuestion(this, 0)">Bryophyte</button>
    <button onclick="answerQuestion(this, 1)">Gymnosperm</button>
    <button onclick="answerQuestion(this, 1)">Angiosperm</button>
    <button onclick="answerQuestion(this, 1)">Fungus</button>
</section>

<section class="question" data-correct="0">
    <p>3. How do ferns reproduce?</p>
    <button onclick="answerQuestion(this, 0)">Spores</button>
    <button onclick="answerQuestion(this, 1)">Seeds</button>
    <button onclick="answerQuestion(this, 1)">Flowers</button>
    <button onclick="answerQuestion(this, 1)">Roots</button>
</section>

<section class="question" data-correct="0">
    <p>4. What carries water in plants?</p>
    <button onclick="answerQuestion(this, 0)">Xylem</button>
    <button onclick="answerQuestion(this, 1)">Phloem</button>
    <button onclick="answerQuestion(this, 1)">Roots</button>
    <button onclick="answerQuestion(this, 1)">Leaves</button>
</section>

<section class="question" data-correct="0">
    <p>5. What molecule carries genetic information in plants?</p>
    <button onclick="answerQuestion(this, 0)">DNA</button>
    <button onclick="answerQuestion(this, 1)">Oxygen</button>
    <button onclick="answerQuestion(this, 1)">Water</button>
    <button onclick="answerQuestion(this, 1)">Chlorophyll</button>
</section>

<section class="question" data-correct="0">
    <p>6. Which part of a plant makes food?</p>
    <button onclick="answerQuestion(this, 0)">Leaves</button>
    <button onclick="answerQuestion(this, 1)">Roots</button>
    <button onclick="answerQuestion(this, 1)">Stem</button>
    <button onclick="answerQuestion(this, 1)">Flowers</button>
</section>

<p id="finalMessage"></p>

<script>
let score = 0;

function answerQuestion(button, value) {
    const section = button.parentNode;

    // Prevent clicking more than once per question
    if (section.dataset.answered === "true") return;

    section.dataset.answered = "true";

    // Correct answer is always index 0
    if (value === 0) {
        button.style.background = "green";
        button.innerText = "✅ Correct!";
        score++;
    } else {
        button.style.background = "red";
        button.innerText = "❌ Wrong";
    }

    // Disable all buttons in this question
    const buttons = section.querySelectorAll("button");
    buttons.forEach(b => b.disabled = true);

    document.getElementById("score").innerText = "Score: " + score;

    // Check if all questions answered
    const allAnswered = Array.from(document.querySelectorAll(".question")).every(q => q.dataset.answered === "true");
    if (allAnswered) {
        const total = document.querySelectorAll(".question").length;
        let msg = "";
        if (score === total) msg = "🏆 Plant Master! Perfect Score!";
        else if (score >= total / 2) msg = "🌿 Great Job! You know your plants!";
        else msg = "🌱 Keep learning! Plants are amazing!";
        document.getElementById("finalMessage").innerText = msg;
    }
}
</script>

</body>
</html>
